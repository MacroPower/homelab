---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

tasks:
  default:
    desc: Run KCL for app
    requires:
      vars: [APP]
    vars:
      F: '{{.F | default "base"}}'
    dir: "{{.ROOT_DIR}}/apps/{{.APP}}/{{.F}}"
    cmds:
      - kat

  render:
    desc: Render KCL for app
    requires:
      vars: [APP]
    vars:
      F: '{{.F | default "base"}}'
      O: '{{.O | default "out.yaml"}}'
    dir: "{{.ROOT_DIR}}/apps/{{.APP}}/{{.F}}"
    cmds:
      - cmd: mkdir -p "{{joinPath .ROOT_DIR .O | dir}}"
        silent: true
      - kat > "{{joinPath .ROOT_DIR .O}}"

  gen:
    desc: Generate KCL code
    cmds:
      - kcl chart update
      - |-
        kcl export konfig/models/backend/ -S BackendTenantPatch \
          --output=konfig/models/frontend/patch.schema.json

  lock:
    desc: Regenerate all kcl.mod.lock files
    cmds:
      - fd kcl.mod.lock apps/ --type f -x rm {}
      - fd '^kcl\.mod$' apps/ --type f --exact-depth 4 -x sh -c 'cd "$(dirname {})" && kcl mod metadata >/dev/null'

  chart:update:
    desc: Update KCL charts
    cmds:
      - kcl chart update

  bootstrap:
    desc: Bootstrap a cluster
    vars:
      F: '{{.F | default "base"}}'
    dir: "{{.ROOT_DIR}}/bootstrap/core/{{.F}}"
    dotenv:
      - .env
    cmds:
      - kcl run
