# yaml-language-server: $schema=../../../../charts/rustdesk/values.schema.json

controllers:
  hbbs:
    replicas: 1
    type: statefulset
    statefulset:
      volumeClaimTemplates:
        - accessMode: ReadWriteOnce
          storageClass: openebs-hostpath
          name: data
          size: 1Gi
          globalMounts:
            - path: /data
    containers:
      hbbs:
        image:
          repository: rustdesk/rustdesk-server-pro
          tag: "1.7.7"
        command:
          - hbbs
        env:
          DATABASE_URL:
            value: sqlite:///data/db.sqlite3
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        probes:
          startup:
            enabled: true
            type: TCP
            port: 21116
            spec:
              failureThreshold: 30
              periodSeconds: 5
          liveness:
            enabled: true
            type: TCP
            port: 21116
          readiness:
            enabled: true
            type: TCP
            port: 21116
  hbbr:
    replicas: 1
    strategy: RollingUpdate
    containers:
      hbbr:
        image:
          repository: rustdesk/rustdesk-server-pro
          tag: "1.7.7"
        command:
          - hbbr
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        probes:
          startup:
            enabled: true
            type: TCP
            port: 21117
            spec:
              failureThreshold: 30
              periodSeconds: 5
          liveness:
            enabled: true
            type: TCP
            port: 21117
          readiness:
            enabled: true
            type: TCP
            port: 21117

service:
  web:
    controller: hbbs
    type: ClusterIP
    ports:
      http:
        port: 21114
        protocol: TCP
  hbbs:
    controller: hbbs
    type: ClusterIP
    ports:
      nat-test:
        port: 21115
        protocol: TCP
      id-tcp:
        port: 21116
        protocol: TCP
      id-udp:
        port: 21116
        protocol: UDP
      ws-id:
        port: 21118
        protocol: TCP
  hbbr:
    controller: hbbr
    type: ClusterIP
    ports:
      relay:
        port: 21117
        protocol: TCP
      ws-relay:
        port: 21119
        protocol: TCP

persistence:
  keys:
    type: secret
    name: rustdesk-keypair
    advancedMounts:
      hbbs:
        hbbs:
          - path: /root
            readOnly: true
      hbbr:
        hbbr:
          - path: /root
            readOnly: true
