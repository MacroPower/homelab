# yaml-language-server: $schema=../../../../charts/k8s_monitoring/values.schema.json

destinations:
  loki:
    url: "http://loki-gateway.o11y-loki.svc/loki/api/v1/push"
  tempo:
    url: "http://tempo-distributed-gateway.o11y-tempo.svc"
    tls:
      insecure: true
  mimir:
    url: "http://mimir-distributed-gateway.o11y-mimir.svc/api/v1/push"

collectors:
  alloy-singleton:
    presets: [singleton]
    extraConfig: |-
      mimir.rules.kubernetes "default" {
        address = "http://mimir-distributed-ruler.o11y-mimir.svc:8080"
        tenant_id = "anonymous"
      }
